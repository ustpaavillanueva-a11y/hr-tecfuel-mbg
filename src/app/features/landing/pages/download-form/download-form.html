<section class="ui vertical segment landing-page-section">
  <div class="ui text container">
    <div class="ui olive label">Available Now</div>
    <h1 class="ui header">Downloadable Forms</h1>
    <p class="page-lead">
      The downloadable forms section is currently the main feature available on this website.
    </p>

    <div class="ui styled fluid accordion download-accordion">
      <div
        class="accordion-block"
        *ngFor="let section of sections; let i = index"
      >
        <div
          class="title"
          [class.active]="activeIndex === i"
          (click)="toggleSection(i)"
        >
          <i class="dropdown icon"></i>
          <span class="accordion-title">{{ section.title }}</span>
          <small class="accordion-description">{{ section.description }}</small>
        </div>

        <div class="content" [class.active]="activeIndex === i">
          <div class="ui relaxed divided list form-list">
            <div class="item" *ngFor="let form of section.forms">
              <i class="large file alternate outline middle aligned green icon"></i>
              <div class="content">
                <a class="header" href="#">{{ form.name }}</a>
                <div class="description">{{ form.note }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
